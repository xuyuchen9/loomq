syntax = "proto3";

package loomq.raft;

option java_package = "com.loomq.raft.grpc";
option java_multiple_files = true;

// Raft 共识 RPC 服务定义。
// 替换自定义 Netty TCP transport。
service RaftService {
    // AppendEntries RPC (§5.3) — 包括心跳
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);

    // InstallSnapshot RPC (§5.5) — 流式分块传输
    rpc InstallSnapshot (stream SnapshotChunk) returns (SnapshotResponse);
}

// ========== AppendEntries ==========

message AppendEntriesRequest {
    int64 epoch = 1;
    string leader_id = 2;
    int64 prev_log_index = 3;
    int64 prev_log_epoch = 4;
    repeated bytes entries = 5;
    int64 leader_commit = 6;
}

message AppendEntriesResponse {
    bool success = 1;
    int64 match_index = 2;
    int64 conflict_index = 3;
    int64 epoch = 4;
}

// ========== InstallSnapshot (streaming chunks) ==========

message SnapshotChunk {
    int64 epoch = 1;
    string leader_id = 2;
    int64 last_included_index = 3;
    int64 last_included_epoch = 4;
    int32 chunk_index = 5;
    int32 total_chunks = 6;
    bytes data = 7;
}

message SnapshotResponse {
    int64 last_included_index = 1;
}
