# =====================================================
# LoomQ Configuration v0.4.5
# High-Performance Delayed Task Queue
# =====================================================

# -----------------------------------------------------
# Server Configuration
# v0.6.0: Netty 原生 HTTP 服务器，目标 300K+ QPS
# -----------------------------------------------------
server:
  host: "${LOOMQ_SERVER_HOST:0.0.0.0}"
  port: ${LOOMQ_SERVER_PORT:8080}
  backlog: ${LOOMQ_SERVER_BACKLOG:1024}
  virtual_threads: ${LOOMQ_VIRTUAL_THREADS:true}
  max_request_size: ${LOOMQ_MAX_REQUEST_SIZE:10485760}
  thread_pool_size: ${LOOMQ_THREAD_POOL_SIZE:200}

# Netty HTTP 服务器配置 (v0.6.0)
netty:
  port: ${LOOMQ_NETTY_PORT:8080}
  host: "${LOOMQ_NETTY_HOST:0.0.0.0}"
  bossThreads: 1
  workerThreads: 0
  maxContentLength: 10485760
  useEpoll: true
  pooledAllocator: true
  soBacklog: 1024
  tcpNoDelay: true
  connectionTimeoutMs: 30000
  idleTimeoutSeconds: 60
  maxConnections: 10000
  writeBufferHighWaterMark: 1048576
  writeBufferLowWaterMark: 524288
  maxConcurrentBusinessRequests: 50000
  gracefulShutdownTimeoutMs: 30000

# -----------------------------------------------------
# WAL (Write-Ahead Log) Configuration
# -----------------------------------------------------
wal:
  data_dir: "${LOOMQ_WAL_DATA_DIR:./data/wal}"
  segment_size_mb: 64
  flush_strategy: "${LOOMQ_WAL_FLUSH_STRATEGY:batch}"  # per_record, batch, async
  batch_flush_interval_ms: 100
  sync_on_write: false
  max_segments: 100
  retention_days: 7
  compression_enabled: true

# -----------------------------------------------------
# Scheduler Configuration
# -----------------------------------------------------
scheduler:
  max_pending_tasks: ${LOOMQ_SCHEDULER_MAX_PENDING:1000000}
  time_bucket_ms: 100
  tick_interval_ms: 10
  virtual_threads: true
  thread_prefix: "loomq-scheduler-"

# -----------------------------------------------------
# Dispatcher Configuration
# -----------------------------------------------------
dispatcher:
  http_timeout_ms: 3000
  max_concurrent_dispatches: ${LOOMQ_DISPATCHER_MAX_CONCURRENT:1000}
  connect_timeout_ms: 5000
  read_timeout_ms: 3000
  follow_redirects: true
  retry_on_timeout: true
  backoff_strategy: "exponential"

# -----------------------------------------------------
# Retry Policy Configuration
# -----------------------------------------------------
retry:
  initial_delay_ms: 1000
  max_delay_ms: 60000
  multiplier: 2.0
  default_max_retry: 5
  jitter_enabled: true
  jitter_factor: 0.1

# -----------------------------------------------------
# Recovery Configuration
# -----------------------------------------------------
recovery:
  batch_size: 1000
  sleep_ms: 10
  concurrency_limit: 100
  safe_mode: false
  auto_start: true
  checkpoint_interval_sec: 60

# -----------------------------------------------------
# Cluster Configuration
# -----------------------------------------------------
cluster:
  enabled: false
  shard_index: ${LOOMQ_SHARD_INDEX:0}
  total_shards: ${LOOMQ_TOTAL_SHARDS:1}
  nodes: ${LOOMQ_NODES:}
  heartbeat_interval_ms: 5000
  heartbeat_timeout_ms: 15000
  flapping_threshold: 3
  flapping_window_ms: 30000

# -----------------------------------------------------
# Security Configuration
# -----------------------------------------------------
security:
  enabled: ${LOOMQ_SECURITY_ENABLED:true}
  token_header: "X-Loomq-Token"
  tokens:
    - "${LOOMQ_DEV_TOKEN:dev-token-12345}"

# -----------------------------------------------------
# Metrics & Monitoring Configuration
# -----------------------------------------------------
metrics:
  enabled: true
  endpoint: "/metrics"
  prometheus_format: true
  jvm_metrics: true
  gc_metrics: true
  thread_metrics: true
  histogram_buckets: [0.001, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

# -----------------------------------------------------
# Health Check Configuration
# -----------------------------------------------------
health:
  enabled: true
  endpoint: "/health"
  readiness_path: "/ready"
  liveness_path: "/live"
  startup_path: "/startup"
  check_interval_ms: 5000

# -----------------------------------------------------
# Logging Configuration
# -----------------------------------------------------
logging:
  level: ${LOOMQ_LOG_LEVEL:INFO}
  format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    enabled: true
    path: "./logs/loomq.log"
    max_size: "100MB"
    max_history: 30
    total_size_cap: "1GB"
  console:
    enabled: true
    color: true
