# LoomQ Docker Compose Configuration
# Version: 0.9.2

services:
  # Single-node Raft-capable deployment
  loomq-single:
    build:
      context: .
      dockerfile: Dockerfile
    image: loomq:0.9.2
    container_name: loomq-single
    ports:
      - "7928:7928"
    environment:
      - LOOMQ_NODE_ID=node-1
      - LOOMQ_RAFT_ENABLED=true
      - LOOMQ_RAFT_NODE_ID=node-1
      - LOOMQ_SERVER_HOST=0.0.0.0
      - LOOMQ_SERVER_PORT=7928
      - LOOMQ_WAL_DATA_DIR=/app/data/wal
      - LOOMQ_WAL_FLUSH_STRATEGY=batch
      - LOOMQ_SCHEDULER_MAX_PENDING_INTENTS=1000000
      - LOOMQ_DISPATCHER_MAX_CONCURRENT=1000
      - JVM_XMS=2g
      - JVM_XMX=2g
      - JVM_GC=ZGC
      - JVM_GC_PAUSE=10
    volumes:
      - loomq-data:/app/data/wal
      - ./config:/app/config:ro
    networks:
      - loomq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7928/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: loomq-prometheus
    ports:
      - "10928:10928"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.listen-address=:10928'
    networks:
      - loomq-network
    profiles:
      - monitoring
      - full

  # Grafana dashboard
  grafana:
    image: grafana/grafana:10.3.0
    container_name: loomq-grafana
    ports:
      - "11928:11928"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SERVER_HTTP_PORT=11928
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=loomq123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - loomq-network
    profiles:
      - monitoring
      - full

volumes:
  loomq-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  loomq-network:
    driver: bridge
