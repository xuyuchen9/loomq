# Prometheus configuration for LoomQ monitoring
# Version: 0.7.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # LoomQ single node
  - job_name: 'loomq-single'
    static_configs:
      - targets: ['loomq-single:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # LoomQ cluster nodes
  - job_name: 'loomq-cluster'
    static_configs:
      - targets:
          - 'loomq-node0:8080'
          - 'loomq-node1:8080'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # LoomQ cluster with relabeling for shard identification
  - job_name: 'loomq-cluster-detailed'
    static_configs:
      - targets: ['loomq-node0:8080']
        labels:
          shard_id: 'shard-0'
          shard_index: '0'
      - targets: ['loomq-node1:8080']
        labels:
          shard_id: 'shard-1'
          shard_index: '1'
    metrics_path: '/metrics'
    scrape_interval: 10s
