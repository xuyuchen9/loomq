openapi: 3.0.3
info:
  title: LoomQ v0.7 API
  description: |
    LoomQ is a future event infrastructure for delayed execution, redelivery, and durable delivery.

    **核心特性**：
    - 延迟任务调度（100ms 精度）
    - 三种 ACK 级别：ASYNC / DURABLE / REPLICATED
    - Primary-Replica 复制架构
    - 自动故障切换
    - 幂等性保证（24h 窗口期）
  version: 0.8.0-SNAPSHOT

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /v1/intents:
    post:
      summary: 创建 Intent
      description: |
        创建一个新的 Intent（延迟任务）。

        **幂等性规则**：
        - `idempotencyKey` 在 24h 窗口期内重复请求：
          - 非终态 Intent → `200 OK` 返回已存在 Intent
          - 终态 Intent → `409 Conflict`
        - 窗口期外视为新业务请求
      operationId: createIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntentRequest'
            examples:
              basic:
                summary: 基础示例
                value:
                  intentId: "intent_01J9XYZABC"
                  executeAt: "2026-04-08T12:30:00Z"
                  deadline: "2026-04-08T12:35:00Z"
                  expiredAction: "DEAD_LETTER"
                  shardKey: "order-12345"
                  ackMode: "REPLICATED"
                  callback:
                    url: "https://api.example.com/webhook/order-cancel"
                    method: "POST"
                    headers:
                      X-Source: "loomq"
                    body:
                      orderId: "order-12345"
                      eventType: "ORDER_CANCEL"
                  redelivery:
                    maxAttempts: 5
                    backoff: "exponential"
                    initialDelayMs: 1000
                    maxDelayMs: 60000
                    multiplier: 2.0
                    jitter: true
                  idempotencyKey: "order-12345-cancel"
                  tags:
                    env: "prod"
                    biz: "order"
      responses:
        '201':
          description: Intent 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '200':
          description: 重复请求，返回已存在的非终态 Intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '409':
          description: 幂等键冲突（Intent 已终态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/intents/{intentId}:
    get:
      summary: 查询 Intent
      operationId: getIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: 修改 Intent
      description: 允许修改 executeAt、deadline、expiredAction、redelivery、tags
      operationId: patchIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchIntentRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
        '422':
          description: 当前状态不可修改

  /v1/intents/{intentId}/cancel:
    post:
      summary: 取消 Intent
      operationId: cancelIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
        '422':
          description: 当前状态不可取消

  /v1/intents/{intentId}/fire-now:
    post:
      summary: 立即触发 Intent
      description: |
        立即触发指定 Intent，无视原定执行时间。

        **Lease 过期处理**：
        - HTTP 307 + Location 头指向新 Primary
        - 响应体包含 `newPrimary` 字段供 SDK 更新路由
      operationId: fireNow
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 触发成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  intentId:
                    type: string
                  status:
                    type: string
                    example: "DISPATCHING"
        '307':
          description: Lease 过期，需要重定向
          headers:
            Location:
              schema:
                type: string
              description: 新 Primary 地址
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Intent 不存在

  /v1/deliveries/{deliveryId}:
    get:
      summary: 查询 Delivery
      operationId: getDelivery
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryResponse'
        '404':
          description: Delivery 不存在

  /v1/cluster/replication:
    get:
      summary: 获取复制状态
      operationId: getReplicationStatus
      responses:
        '200':
          description: 复制状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicationStatus'

  /v1/shards/{shardId}:
    get:
      summary: 获取 Shard 详情
      operationId: getShardDetail
      parameters:
        - name: shardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shard 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShardDetail'

  /health:
    get:
      summary: 总体健康状态
      operationId: health
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "UP"

  /health/live:
    get:
      summary: 存活探针（K8s liveness）
      operationId: liveness
      responses:
        '200':
          description: 存活

  /health/ready:
    get:
      summary: 就绪探针（K8s readiness）
      operationId: readiness
      responses:
        '200':
          description: 就绪

  /health/replica:
    get:
      summary: 复制链路健康检查
      operationId: replicaHealth
      responses:
        '200':
          description: 复制链路正常
        '503':
          description: 复制链路异常

components:
  schemas:
    CreateIntentRequest:
      type: object
      required:
        - executeAt
        - deadline
        - shardKey
        - callback
      properties:
        intentId:
          type: string
          description: 系统唯一标识，未提供则自动生成
        executeAt:
          type: string
          format: date-time
          description: 计划执行时间（RFC3339）
        deadline:
          type: string
          format: date-time
          description: 最晚有效时间
        expiredAction:
          type: string
          enum: [DISCARD, DEAD_LETTER]
          default: DISCARD
          description: 过期后动作
        shardKey:
          type: string
          description: 分片键，用于路由
        ackMode:
          type: string
          enum: [ASYNC, DURABLE, REPLICATED]
          default: DURABLE
          description: ACK 级别
        callback:
          $ref: '#/components/schemas/Callback'
        redelivery:
          $ref: '#/components/schemas/RedeliveryPolicy'
        idempotencyKey:
          type: string
          description: 业务唯一键，用于幂等创建
        tags:
          type: object
          additionalProperties:
            type: string
          description: 业务标签

    PatchIntentRequest:
      type: object
      properties:
        executeAt:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        expiredAction:
          type: string
          enum: [DISCARD, DEAD_LETTER]
        redelivery:
          $ref: '#/components/schemas/RedeliveryPolicy'
        tags:
          type: object
          additionalProperties:
            type: string

    IntentResponse:
      type: object
      properties:
        intentId:
          type: string
        status:
          type: string
          enum: [CREATED, SCHEDULED, DUE, DISPATCHING, DELIVERED, ACKED, CANCELED, EXPIRED, DEAD_LETTERED]
        executeAt:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        expiredAction:
          type: string
        ackMode:
          type: string
        attempts:
          type: integer
        lastDeliveryId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Callback:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          oneOf:
            - type: object
            - type: string

    RedeliveryPolicy:
      type: object
      properties:
        maxAttempts:
          type: integer
          default: 5
        backoff:
          type: string
          enum: [fixed, exponential]
          default: exponential
        initialDelayMs:
          type: integer
          default: 1000
        maxDelayMs:
          type: integer
          default: 60000
        multiplier:
          type: number
          default: 2.0
        jitter:
          type: boolean
          default: true

    DeliveryResponse:
      type: object
      properties:
        deliveryId:
          type: string
        intentId:
          type: string
        attempt:
          type: integer
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        httpStatus:
          type: integer
        latencyMs:
          type: integer
        errorCode:
          type: string
        errorMessage:
          type: string

    ReplicationStatus:
      type: object
      properties:
        shardId:
          type: string
        role:
          type: string
          enum: [PRIMARY, REPLICA]
        primaryNode:
          type: string
        replicaNode:
          type: string
        replicationLagMs:
          type: integer
        lastReplicatedOffset:
          type: integer

    ShardDetail:
      type: object
      properties:
        shardId:
          type: string
        primaryNode:
          type: string
        replicaNode:
          type: string
        role:
          type: string
        leaseVersion:
          type: integer
        routingVersion:
          type: integer
        lastAppliedOffset:
          type: integer
        lastReplicatedOffset:
          type: integer
        replicationLagMs:
          type: integer
        pendingIntents:
          type: integer

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误码
        message:
          type: string
          description: 错误信息
        details:
          type: object
          additionalProperties: true

  # 错误码定义
  responses:
    Conflict:
      description: 幂等键冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "40901"
            message: "Idempotency key conflict: intent already in terminal state"
            details:
              intentId: "intent_01J9XYZABC"

    FencingExpired:
      description: Lease 过期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "50304"
            message: "Lease expired, current primary is 10.0.1.100"
            details:
              intentId: "intent_01J9XYZABC"
              redirectTo: "http://10.0.1.100:8080/v1/intents/intent_01J9XYZABC/fire-now"
              newPrimary: "10.0.1.100:8080"
