openapi: 3.0.3
info:
  title: LoomQ v0.9 API
  description: |
    LoomQ is a future event infrastructure for delayed execution, redelivery, and durable delivery.

    **核心特性**：
    - 延迟任务调度（100ms 精度）
    - 三种 ACK 级别：ASYNC / DURABLE / REPLICATED
    - Raft-backed replication and snapshot recovery
    - Immediate fire-now execution
    - 幂等性保证（24h 窗口期）
  version: 0.9.1

servers:
  - url: http://localhost:7928
    description: Local development server

paths:
  /v1/intents:
    post:
      summary: 创建 Intent
      description: |
        创建一个新的 Intent（延迟任务）。

        **幂等性规则**：
        - `idempotencyKey` 在 24h 窗口期内重复请求：
          - 非终态 Intent → `200 OK` 返回已存在 Intent
          - 终态 Intent → `409 Conflict`
        - 窗口期外视为新业务请求
      operationId: createIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntentRequest'
            examples:
              basic:
                summary: 基础示例
                value:
                  intentId: "intent_01J9XYZABC"
                  executeAt: "2026-04-08T12:30:00Z"
                  deadline: "2026-04-08T12:35:00Z"
                  expiredAction: "DEAD_LETTER"
                  shardKey: "order-12345"
                  ackMode: "REPLICATED"
                  callback:
                    url: "https://api.example.com/webhook/order-cancel"
                    method: "POST"
                    headers:
                      X-Source: "loomq"
                    body:
                      orderId: "order-12345"
                      eventType: "ORDER_CANCEL"
                  redelivery:
                    maxAttempts: 5
                    backoff: "exponential"
                    initialDelayMs: 1000
                    maxDelayMs: 60000
                    multiplier: 2.0
                    jitter: true
                  idempotencyKey: "order-12345-cancel"
                  tags:
                    env: "prod"
                    biz: "order"
      responses:
        '201':
          description: Intent 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '200':
          description: 重复请求，返回已存在的非终态 Intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '409':
          description: 幂等键冲突（Intent 已终态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/intents/{intentId}:
    get:
      summary: 查询 Intent
      description: |
        查询当前 Intent 的快照。

        在 Raft 模式下，这个接口是 leader-authoritative：
        follower 会返回 503，并通过 `ErrorResponse.details` 携带可重试信息与 leader hint。
      operationId: getIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Raft follower rejected the read; retry on the leader
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "50301"
                message: "Read must be served by the Raft leader"
                details:
                  retryable: true
                  nodeRole: "FOLLOWER"
                  leaderId: "node-1"

    patch:
      summary: 修改 Intent
      description: 允许修改 executeAt、deadline、expiredAction、redelivery、tags
      operationId: patchIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchIntentRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
        '422':
          description: 当前状态不可修改

  /v1/intents/{intentId}/cancel:
    post:
      summary: 取消 Intent
      operationId: cancelIntent
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404':
          description: Intent 不存在
        '422':
          description: 当前状态不可取消

  /v1/intents/{intentId}/fire-now:
    post:
      summary: 立即触发 Intent
      description: |
        立即触发指定 Intent，无视原定执行时间。
      operationId: fireNow
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 触发成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  intentId:
                    type: string
                  status:
                    type: string
                    example: "DISPATCHING"
        '404':
          description: Intent 不存在

  /v1/deliveries/{deliveryId}:
    get:
      summary: 查询 Delivery
      operationId: getDelivery
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryResponse'
        '404':
          description: Delivery 不存在

  /health:
    get:
      summary: 总体健康状态
      description: |
        返回 WAL 和 Raft 的当前健康状态。

        `/health` 适合运维快速判断节点是否可读可写；Raft 安全信号集中在 `raft` 区块里。
      operationId: health
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/live:
    get:
      summary: 存活探针（K8s liveness）
      description: 仅反映进程是否存活。
      operationId: liveness
      responses:
        '200':
          description: 存活

  /health/ready:
    get:
      summary: 就绪探针（K8s readiness）
      description: |
        反映节点是否适合接收客户端流量。

        embedded 模式下主要检查 WAL 健康；Raft 模式下只有当前 leader 在 quorum 可达、读租约有效、commit/apply 无积压且写队列无积压时才返回 200。
      operationId: readiness
      responses:
        '200':
          description: 就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: 未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 503
                error:
                  code: "50304"
                  message: "Node is not ready to serve client traffic"
                  details:
                    ready: false
                    mode: raft
                    role: FOLLOWER
                    leaderId: node-1
                    reason: RAFT_NOT_LEADER

  /health/deep:
    get:
      summary: 深度健康探针
      description: |
        在 `/health` 的基础上附加精度档位的 backpressure 详情。
      operationId: deepHealth
      responses:
        '200':
          description: 深度健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDeepResponse'

  /metrics:
    get:
      summary: JSON metrics snapshot
      description: |
        返回所有 kernel、WAL 和 Raft 指标的 JSON 快照。
      operationId: metrics
      responses:
        '200':
          description: 指标快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'

  /api/v1/metrics:
    get:
      summary: JSON metrics snapshot alias
      description: |
        `/metrics` 的兼容别名。
      operationId: metricsAlias
      responses:
        '200':
          description: 指标快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'

components:
  securitySchemes:
    ApiTokenAuth:
      type: apiKey
      in: header
      name: X-Loomq-Token
      description: Required for `/v1/**` and metrics endpoints when `security.enabled=true`.
  schemas:
    CreateIntentRequest:
      type: object
      required:
        - executeAt
        - deadline
        - shardKey
        - callback
      properties:
        intentId:
          type: string
          description: 系统唯一标识，未提供则自动生成
        executeAt:
          type: string
          format: date-time
          description: 计划执行时间（RFC3339）
        deadline:
          type: string
          format: date-time
          description: 最晚有效时间
        expiredAction:
          type: string
          enum: [DISCARD, DEAD_LETTER]
          default: DISCARD
          description: 过期后动作
        shardKey:
          type: string
          description: 分片键，用于路由
        ackMode:
          type: string
          enum: [ASYNC, DURABLE, REPLICATED]
          default: DURABLE
          description: ACK 级别
        callback:
          $ref: '#/components/schemas/Callback'
        redelivery:
          $ref: '#/components/schemas/RedeliveryPolicy'
        idempotencyKey:
          type: string
          description: 业务唯一键，用于幂等创建
        tags:
          type: object
          additionalProperties:
            type: string
          description: 业务标签

    PatchIntentRequest:
      type: object
      properties:
        executeAt:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        expiredAction:
          type: string
          enum: [DISCARD, DEAD_LETTER]
        redelivery:
          $ref: '#/components/schemas/RedeliveryPolicy'
        tags:
          type: object
          additionalProperties:
            type: string

    IntentResponse:
      type: object
      properties:
        intentId:
          type: string
        status:
          type: string
          enum: [CREATED, SCHEDULED, DUE, DISPATCHING, DELIVERED, ACKED, CANCELED, EXPIRED, DEAD_LETTERED]
        executeAt:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        expiredAction:
          type: string
        ackMode:
          type: string
        attempts:
          type: integer
        lastDeliveryId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Callback:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          oneOf:
            - type: object
            - type: string

    RedeliveryPolicy:
      type: object
      properties:
        maxAttempts:
          type: integer
          default: 5
        backoff:
          type: string
          enum: [fixed, exponential]
          default: exponential
        initialDelayMs:
          type: integer
          default: 1000
        maxDelayMs:
          type: integer
          default: 60000
        multiplier:
          type: number
          default: 2.0
        jitter:
          type: boolean
          default: true

    DeliveryResponse:
      type: object
      properties:
        deliveryId:
          type: string
        intentId:
          type: string
        attempt:
          type: integer
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        httpStatus:
          type: integer
        latencyMs:
          type: integer
        errorCode:
          type: string
        errorMessage:
          type: string

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - wal
        - raft
      properties:
        status:
          type: string
          description: WAL health state, typically OK, WARNING, or CRITICAL
          example: "OK"
        timestamp:
          type: string
          format: date-time
        wal:
          $ref: '#/components/schemas/WalHealth'
        raft:
          $ref: '#/components/schemas/RaftHealth'

    HealthDeepResponse:
      allOf:
        - $ref: '#/components/schemas/HealthResponse'
        - type: object
          properties:
            tiers:
              type: object
              additionalProperties:
                type: object
                properties:
                  maxConcurrency:
                    type: integer
                  activeDispatches:
                    type: integer
                  availablePermits:
                    type: integer
                  queueSize:
                    type: integer
                  utilizationPct:
                    type: string
                  underBackpressure:
                    type: boolean

    ReadinessResponse:
      type: object
      required:
        - status
        - ready
        - mode
        - raftEnabled
        - walHealthy
        - acceptingReads
        - acceptingWrites
        - reason
      properties:
        status:
          type: string
          enum: [UP, DOWN]
        ready:
          type: boolean
        mode:
          type: string
          enum: [embedded, raft]
        raftEnabled:
          type: boolean
        walHealthy:
          type: boolean
        nodeId:
          type: string
        role:
          type: string
        leaderId:
          type: string
        term:
          type: integer
        commitIndex:
          type: integer
        lastApplied:
          type: integer
        commitLag:
          type: integer
        connectedPeers:
          type: integer
        totalPeers:
          type: integer
        quorumReachable:
          type: boolean
        acceptingReads:
          type: boolean
        acceptingWrites:
          type: boolean
        writePending:
          type: integer
        reason:
          type: string
          enum:
            - READY
            - WAL_UNHEALTHY
            - RAFT_NOT_LEADER
            - RAFT_QUORUM_UNREACHABLE
            - RAFT_READ_LEASE_UNAVAILABLE
            - RAFT_COMMIT_LAG
            - RAFT_PENDING_WRITES

    WalHealth:
      type: object
      required:
        - status
        - unflushedBytes
        - lastFsyncMsAgo
        - writePosition
        - flushedPosition
      properties:
        status:
          type: string
          description: WAL health state emitted by the runtime
        unflushedBytes:
          type: integer
        lastFsyncMsAgo:
          type: integer
        writePosition:
          type: integer
        flushedPosition:
          type: integer

    RaftHealth:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        nodeId:
          type: string
        role:
          type: string
        leaderId:
          type: string
        term:
          type: integer
        commitIndex:
          type: integer
        lastApplied:
          type: integer
        commitLag:
          type: integer
        replicationLag:
          type: integer
        connectedPeers:
          type: integer
        totalPeers:
          type: integer
        peerReachability:
          type: object
          additionalProperties:
            type: boolean
        quorumReachable:
          type: boolean
        writePending:
          type: integer
        writeProposalLatencyMs:
          type: number
        writeProposalLatencyMaxMs:
          type: integer
        writeTimeouts:
          type: integer
        writeStepDownAborts:
          type: integer
        acceptingReads:
          type: boolean
        acceptingWrites:
          type: boolean

    MetricsSnapshot:
      type: object
      properties:
        intentsCreated:
          type: integer
        intentsCompleted:
          type: integer
        intentsCancelled:
          type: integer
        intentsExpired:
          type: integer
        intentsDeadLettered:
          type: integer
        intentsByStatus:
          type: object
          additionalProperties:
            type: integer
        deliveriesTotal:
          type: integer
        deliveriesSuccess:
          type: integer
        deliveriesFailed:
          type: integer
        deliveriesRetried:
          type: integer
        avgDeliveryLatencyMs:
          type: number
        maxDeliveryLatencyMs:
          type: integer
        replicationRecordsSent:
          type: integer
        replicationRecordsAcked:
          type: integer
        replicationLagMs:
          type: integer
        walRecordsWritten:
          type: integer
        snapshotsCreated:
          type: integer
        pendingIntents:
          type: integer
        activeDispatches:
          type: integer
        walHealthy:
          type: boolean
        walLastFlushTime:
          type: integer
        walIdleTimeMs:
          type: integer
        walFlushErrorCount:
          type: integer
        avgWalFlushLatencyMs:
          type: number
        maxWalFlushLatencyMs:
          type: integer
        walPendingWrites:
          type: integer
        walRingBufferSize:
          type: integer
        raftRole:
          type: string
        raftLeaderId:
          type: string
        raftTerm:
          type: integer
        raftCommitIndex:
          type: integer
        raftLastApplied:
          type: integer
        raftCommitLag:
          type: integer
        raftReplicationLag:
          type: integer
        raftConnectedPeers:
          type: integer
        raftTotalPeers:
          type: integer
        raftPendingWrites:
          type: integer
        raftWriteProposalLatencyMs:
          type: number
        raftWriteProposalLatencyMaxMs:
          type: integer
        raftWriteTimeouts:
          type: integer
        raftWriteStepDownAborts:
          type: integer
        raftWriteBackpressureRejects:
          type: integer
        raftWriteRevisionConflicts:
          type: integer
      additionalProperties: true

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误码
        message:
          type: string
          description: 错误信息
        details:
          type: object
          additionalProperties: true

  # 错误码定义
  responses:
    Conflict:
      description: 幂等键冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "40901"
            message: "Idempotency key conflict: intent already in terminal state"
            details:
              intentId: "intent_01J9XYZABC"
